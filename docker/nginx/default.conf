server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 64M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    charset utf-8;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Use Docker's embedded DNS resolver so `app` is resolved at request
        # time rather than once at nginx startup. Without this, nginx on Linux
        # (GitHub Actions / production) will fail to start if the `app`
        # container's DNS entry isn't registered in the exact moment nginx
        # initialises — causing ERR_CONNECTION_REFUSED for any downstream
        # caller (Dusk/Chrome) that tries to reach this nginx instance.
        resolver 127.0.0.11 valid=10s;
        set $fpm_backend "app:9000";
        fastcgi_pass $fpm_backend;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
